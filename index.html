<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RootX — Telegram Ban Protect</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --border: #1f2433;
    --accent: #ff6b2b;
    --accent2: #ff8c55;
    --text: #e8eaf0;
    --muted: #5a6080;
    --green: #2dcc7a;
    --red: #ff4f4f;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
  }
  .wrap { width: 100%; max-width: 480px; }

  .header { text-align: center; margin-bottom: 24px; }
  .logo { font-family: var(--mono); font-size: 10px; letter-spacing: 0.25em; color: var(--accent); text-transform: uppercase; margin-bottom: 5px; }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  h1 span { color: var(--accent); }
  .subtitle { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 4px; letter-spacing: 0.05em; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; }
  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .card-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }

  .top-btns { display: flex; gap: 6px; }
  .btn-sm {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 9px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.06em;
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.ok { border-color: var(--green); color: var(--green); }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    outline: none;
    resize: none;
    transition: border-color 0.2s;
    line-height: 1.6;
    height: 90px;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); opacity: 0.45; }

  .btn-krdo {
    width: 100%;
    margin-top: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-krdo:hover { background: var(--accent2); }
  .btn-krdo:active { transform: scale(0.98); }

  .sep { height: 1px; background: var(--border); margin: 12px 0; }

  .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .result-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }

  .result-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    min-height: 52px;
    word-break: break-all;
    white-space: pre-wrap;
    line-height: 1.6;
  }
  .result-box.empty { color: var(--muted); font-size: 11px; font-style: italic; }
  .result-box.err { color: var(--red); font-size: 11px; }

  .note {
    background: #0d0f14;
    border: 1px solid #1f2433;
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 4px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.75;
  }
  .note b { color: var(--accent); }
  .note a { color: var(--accent2); text-decoration: none; }
  .note a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo">RootX India</div>
    <h1>Telegram <span>Ban Protect</span></h1>
    <div class="subtitle">offline · base64 · no server</div>
  </div>

  <!-- Encrypt -->
  <div class="card">
    <div class="card-top">
      <div class="card-label">Encode</div>
      <div class="top-btns">
        <button class="btn-sm" id="encPaste" onclick="doPaste('enc')">Paste</button>
        <button class="btn-sm" id="encClear" onclick="doClear('enc')">Clear</button>
      </div>
    </div>
    <textarea id="encIn" placeholder="Type or paste text here…" spellcheck="false"></textarea>
    <button class="btn-krdo" onclick="doEncode()">Encode → Krdo</button>
    <div class="sep"></div>
    <div class="result-header">
      <div class="result-label">Result</div>
      <button class="btn-sm" id="encCopy" onclick="doCopy('enc')">Copy</button>
    </div>
    <div class="result-box empty" id="encOut">—</div>
  </div>

  <!-- Decrypt -->
  <div class="card">
    <div class="card-top">
      <div class="card-label">Decode</div>
      <div class="top-btns">
        <button class="btn-sm" id="decPaste" onclick="doPaste('dec')">Paste</button>
        <button class="btn-sm" id="decClear" onclick="doClear('dec')">Clear</button>
      </div>
    </div>
    <textarea id="decIn" placeholder="Paste encoded text here…" spellcheck="false"></textarea>
    <button class="btn-krdo" onclick="doDecode()">Decode → Krdo</button>
    <div class="sep"></div>
    <div class="result-header">
      <div class="result-label">Result</div>
      <button class="btn-sm" id="decCopy" onclick="doCopy('dec')">Copy</button>
    </div>
    <div class="result-box empty" id="decOut">—</div>
  </div>

  <!-- Note -->
  <div class="note">
    YE TO SIMPLE BASE64 WLA H<br>
    PR AGAR KISI APNE APP YA WEB KE LIYE<br>
    ENTERPRISES LEVEL SECURITY CHAIYE<br>
    TO DM ME <b><a href="https://t.me/simpleguy444" target="_blank">@simpleguy444</a></b>
  </div>

</div>

<script>
var _r = { enc: null, dec: null };

function doEncode() {
  var val = document.getElementById('encIn').value;
  var out = document.getElementById('encOut');
  if (!val) { out.textContent = 'Input is empty.'; out.className = 'result-box err'; _r.enc = null; return; }
  try {
    // encode each line separately to preserve newlines exactly
    var lines = val.split('\n');
    var encoded = lines.map(function(l) { return btoa(unescape(encodeURIComponent(l))); }).join('\n');
    out.textContent = encoded;
    out.className = 'result-box';
    _r.enc = encoded;
  } catch(e) {
    out.textContent = 'Error: ' + e.message;
    out.className = 'result-box err';
    _r.enc = null;
  }
}

function doDecode() {
  var val = document.getElementById('decIn').value.trim();
  var out = document.getElementById('decOut');
  if (!val) { out.textContent = 'Input is empty.'; out.className = 'result-box err'; _r.dec = null; return; }
  try {
    var lines = val.split('\n');
    var decoded = lines.map(function(l) {
      var t = l.trim();
      if (!t) return '';
      return decodeURIComponent(escape(atob(t)));
    }).join('\n');
    out.textContent = decoded;
    out.className = 'result-box';
    _r.dec = decoded;
  } catch(e) {
    out.textContent = 'Error: Invalid Base64 input.';
    out.className = 'result-box err';
    _r.dec = null;
  }
}

function doCopy(t) {
  var v = _r[t];
  if (!v) return;
  navigator.clipboard.writeText(v).then(function() {
    var b = document.getElementById(t + 'Copy');
    b.textContent = 'Copied!';
    b.className = 'btn-sm ok';
    setTimeout(function() { b.textContent = 'Copy'; b.className = 'btn-sm'; }, 1500);
  });
}

function doPaste(t) {
  navigator.clipboard.readText().then(function(txt) {
    document.getElementById(t + 'In').value = txt;
    var b = document.getElementById(t + 'Paste');
    b.textContent = 'Pasted!';
    b.className = 'btn-sm ok';
    setTimeout(function() { b.textContent = 'Paste'; b.className = 'btn-sm'; }, 1200);
  }).catch(function() {
    // fallback: focus the textarea so user can Ctrl+V
    document.getElementById(t + 'In').focus();
  });
}

function doClear(t) {
  document.getElementById(t + 'In').value = '';
  var out = document.getElementById(t + 'Out');
  out.textContent = '—';
  out.className = 'result-box empty';
  _r[t] = null;
}

// Enter = Shift+Enter for newline, Ctrl+Enter to run
document.getElementById('encIn').addEventListener('keydown', function(e) { if (e.ctrlKey && e.key === 'Enter') doEncode(); });
document.getElementById('decIn').addEventListener('keydown', function(e) { if (e.ctrlKey && e.key === 'Enter') doDecode(); });
</script>
</body>
</html>
